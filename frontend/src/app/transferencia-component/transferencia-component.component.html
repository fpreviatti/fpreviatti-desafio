<div class="transferencia-container">
  <h2>Realizar Transferência</h2>

  <form [formGroup]="transferenciaForm" (ngSubmit)="onSubmit()">

    <!-- Busca pelo usuário -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Destinatário</mat-label>
      <input type="text"
             matInput
             [matAutocomplete]="auto"
             formControlName="usuario">
      <mat-autocomplete #auto="matAutocomplete">
        <mat-option *ngFor="let user of usuariosFiltrados | async" [value]="user.nome">
          {{ user.nome }}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>

    <!-- Valor da transferência -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Valor</mat-label>
      <input type="number"
             matInput
             formControlName="valor"
             placeholder="R$ 0,00"
             step="0.01">
      <span matSuffix>R$</span>
    </mat-form-field>

    <!-- Descrição opcional -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="descricao" placeholder="Opcional">
    </mat-form-field>

    <!-- Botão enviar -->
    <button mat-raised-button color="primary" type="submit" [disabled]="transferenciaForm.invalid">
      Enviar Transferência
    </button>

  </form>
</div>
