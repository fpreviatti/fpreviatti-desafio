<div class="beneficio-container">
  <h2>Gerenciar Benefícios</h2>

  <div class="beneficio-lista">
    <mat-card *ngFor="let b of beneficios" class="beneficio-card" (click)="remover(b.id)">
    <div class="beneficio-content">
        <div class="beneficio-info">
        <strong>{{ b.nome }}</strong>
        <span class="descricao">{{ b.descricao }}</span>
        <span class="valor">{{ b.valor | real }}</span>
        </div>
    </div>
    </mat-card>
  </div>

  <div class="beneficio-adicao">
    <h3>Adicionar Novo Benefício</h3>
    <form [formGroup]="beneficioForm" (ngSubmit)="adicionar()" class="beneficio-form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" placeholder="Nome do benefício">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Descrição</mat-label>
        <input matInput formControlName="descricao" placeholder="Descrição do benefício">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Valor</mat-label>
        <input matInput type="number" formControlName="valor" placeholder="R$ 0,00" step="0.01">
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="beneficioForm.invalid">
        Adicionar Benefício
      </button>
    </form>
  </div>
</div>
